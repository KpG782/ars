name: talyer
description: "Talyer — verified mechanics, on demand. Flutter app + design system."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Design system
  google_fonts: ^8.0.2 # Space Grotesk + Inter (OFL, no bundled binaries)

  # Routing
  go_router: ^16.0.0

  # State management (clean-architecture wiring; dependency inversion)
  flutter_riverpod: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
